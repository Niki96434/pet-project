version: "3.8"

services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

  backend:
    build: 
      context: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server:/server
      - /server/node_modules
      - ./server/tasks:/server/tasks